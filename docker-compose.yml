services:
  # Jellyfin Media Server
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Paris}
    volumes:
      - ./jellyfin/config:/config
      - ./jellyfin/cache:/cache
      - ${MEDIA_PATH}/Movies:/media/Movies
      - ${MEDIA_PATH}/TvShows:/media/TvShows
      - ${MEDIA_PATH}/KidsMovies:/media/KidsMovies
      - ${MEDIA_PATH}/KidsTvShows:/media/KidsTvShows
    # 8096 bound to 127.0.0.1 only: accessible locally for setup scripts, not exposed publicly
    # 7359/udp: Jellyfin LAN client discovery
    ports:
      - "127.0.0.1:8096:8096"
      - "7359:7359/udp"
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    networks:
      - media-network

  # Transmission Torrent Client
  transmission:
    image: linuxserver/transmission:latest
    container_name: transmission
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Paris}
      - USER=${TRANSMISSION_USER:-admin}
      - PASS=${TRANSMISSION_PASS:-admin}
    volumes:
      - ./transmission/config:/config
      - ./transmission/watch:/watch
      - ${MEDIA_PATH}:/downloads
    # 9091 removed: NPM handles external access via media-network
    # 51413 kept: inbound BitTorrent port (required for peers)
    ports:
      - "51413:51413"
      - "51413:51413/udp"
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    networks:
      - media-network

  # Docker Socket Proxy — exposes the Docker socket over TCP with minimal permissions
  # Ofelia connects to this proxy instead of the socket directly (avoids host root access)
  # docker-socket-proxy:
  #   image: tecnativa/docker-socket-proxy:latest
  #   container_name: docker-socket-proxy
  #   environment:
  #     - LOG_LEVEL=warning
  #     - CONTAINERS=1  # list/inspect containers
  #     - EXEC=1        # create and start exec sessions (job-exec)
  #     - EVENTS=1      # Docker event stream (daemon --docker mode)
  #     - POST=1        # allow POST requests (required to create/start exec sessions)
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock:ro
  #   restart: unless-stopped
  #   networks:
  #     - socket-proxy-network

  # Cron Job Manager (Ofelia)
  # cron:
  #   image: mcuadros/ofelia:latest
  #   container_name: cron-manager
  #   depends_on:
  #     - wordpress
  #     - transmission
  #     - docker-socket-proxy
  #   command: daemon --config=/etc/ofelia/config.ini
  #   environment:
  #     - DOCKER_HOST=tcp://docker-socket-proxy:2375
  #   volumes:
  #     - ./cron/config.ini:/etc/ofelia/config.ini
  #   restart: unless-stopped
  #   networks:
  #     - media-network
  #     - wordpress-network
  #     - socket-proxy-network

  # MySQL Database for WordPress
  mysql:
    image: mysql:8.0
    container_name: mysql-wordpress
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-rootpassword}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-wordpress}
      - MYSQL_USER=${MYSQL_USER:-wordpress}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-wordpress}
    volumes:
      - ./mysql/data:/var/lib/mysql
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    networks:
      - wordpress-network

  # WordPress Application
  # wordpress:
  #   image: wordpress:latest
  #   container_name: wordpress-app
  #   depends_on:
  #     - mysql
  #   environment:
  #     - WORDPRESS_DB_HOST=mysql:3306
  #     - WORDPRESS_DB_USER=${MYSQL_USER:-wordpress}
  #     - WORDPRESS_DB_PASSWORD=${MYSQL_PASSWORD:-wordpress}
  #     - WORDPRESS_DB_NAME=${MYSQL_DATABASE:-wordpress}
  #   volumes:
  #     - ./wordpress/html:/var/www/html
  #     - ./wordpress/plugins:/var/www/html/wp-content/plugins
  #     - ./wordpress/themes:/var/www/html/wp-content/themes
  #     - ./wordpress/uploads:/var/www/html/wp-content/uploads
  #   security_opt:
  #     - no-new-privileges:true
  #   restart: unless-stopped
  #   networks:
  #     - wordpress-network

  # Nginx Proxy Manager (for domains and SSL certificates)
  nginx-proxy:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx-proxy-manager
    depends_on:
      - jellyfin
      # - transmission
      # - wordpress
    ports:
      - "80:80"
      - "443:443"
      - "81:81"   # Admin interface — bind to 127.0.0.1:81 if the server is publicly exposed
    security_opt:
      - no-new-privileges:true
    environment:
      - DB_SQLITE_FILE=/data/database.sqlite
    volumes:
      - ./nginx-proxy/data:/data
      - ./nginx-proxy/letsencrypt:/etc/letsencrypt
    restart: unless-stopped
    networks:
      - media-network
      - wordpress-network

networks:
  media-network:
    driver: bridge
  wordpress-network:
    driver: bridge
  socket-proxy-network:
    driver: bridge
    internal: true  # no Internet access — internal network only

volumes:
  jellyfin-config:
  jellyfin-cache:
  transmission-config:
  mysql-data:
  wordpress-html:
  nginx-data:
  nginx-letsencrypt:
