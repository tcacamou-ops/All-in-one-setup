# schedule = 0 0 2 * * *
# container = mysql-wordpress
# command = mysqldump -u root -p${MYSQL_ROOT_PASSWORD} wordpress > /var/lib/mysql/backup.sql

# Add more cron jobs as needed
# Schedule format: 
# - @every <duration> (e.g., @every 1h, @every 30m)
# - Cron format: second minute hour day month weekday (e.g., 0 0 2 * * *)
