# Ofelia Cron Configuration
# Edit this file to add your scheduled tasks

# Example: WordPress cron job (every 5 minutes)
[job-exec "wordpress-cron"]
schedule = @every 5m
container = wordpress-app
command = php /var/www/html/wp-cron.php

# Example: Clean old torrents (daily at 3 AM)
# [job-exec "clean-torrents"]
# schedule = 0 0 3 * * *
# container = transmission
# command = find /downloads -type f -mtime +30 -delete

# Example: Backup database (daily at 2 AM)
